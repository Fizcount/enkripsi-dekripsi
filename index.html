<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XRF Cipher</title>
    <style>
        :root {
            --bg: #0a0f1c;
            --card: #121a2b;
            --border: #24304a;
            --primary: #00d4ff;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            padding: 20px;
            line-height: 1.6;
        }

        h1, h2, h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        textarea, input[type="text"] {
            width: 100%;
            background-color: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus, input[type="text"]:focus {
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: var(--primary);
            color: var(--bg);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        .stat-box {
            background-color: var(--bg);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #8892b0;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            margin-top: 5px;
        }

        .log-container {
            background-color: var(--bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
            height: 300px;
            overflow-y: auto;
            font-size: 13px;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(36, 48, 74, 0.5);
            padding-bottom: 5px;
        }

        .log-round {
            color: #ffb86c;
            margin-top: 10px;
        }

        .log-success { color: #50fa7b; }
        .log-info { color: #8be9fd; }

        .diagram {
            text-align: center;
            background-color: var(--bg);
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 4px;
            line-height: 1.8;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .arrow {
            color: #ff79c6;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card full-width">
            <h1>XRF Cipher</h1>
            <p>Multi-Round XOR Rail Fence Encryption</p>
        </div>

        <div class="left-col">
            <div class="card">
                <label for="inputText">Input Text</label>
                <textarea id="inputText" placeholder="Enter plaintext or ciphertext here..."></textarea>
            </div>

            <div class="card">
                <label for="keyInput">Key</label>
                <input type="text" id="keyInput" placeholder="Enter encryption key...">
            </div>

            <div class="card">
                <h3>Key Analysis</h3>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Length</div>
                        <div class="stat-value" id="statLength">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">First Char</div>
                        <div class="stat-value" id="statFirst">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Last Char</div>
                        <div class="stat-value" id="statLast">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Rail Count</div>
                        <div class="stat-value" id="statRail">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Loop Count</div>
                        <div class="stat-value" id="statLoop">0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="btn-group">
                    <button onclick="processCipher('encrypt')">Encrypt</button>
                    <button onclick="processCipher('decrypt')">Decrypt</button>
                    <button onclick="copyOutput()">Copy Output</button>
                    <button onclick="clearAll()">Clear</button>
                </div>
            </div>

            <div class="card">
                <h3>Algorithm Flow</h3>
                <div class="diagram">
                    Plaintext<br>
                    <span class="arrow">↓</span><br>
                    XOR<br>
                    <span class="arrow">↓</span><br>
                    Rail Fence<br>
                    <span class="arrow">↓</span><br>
                    Repeat N Times<br>
                    <span class="arrow">↓</span><br>
                    Base64<br>
                    <span class="arrow">↓</span><br>
                    Ciphertext
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <label for="outputText">Output</label>
                <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
            </div>

            <div class="card">
                <h3>Process Log</h3>
                <div class="log-container" id="processLog"></div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const elInputText = document.getElementById('inputText');
        const elKeyInput = document.getElementById('keyInput');
        const elOutputText = document.getElementById('outputText');
        const elLog = document.getElementById('processLog');

        const elStatLength = document.getElementById('statLength');
        const elStatFirst = document.getElementById('statFirst');
        const elStatLast = document.getElementById('statLast');
        const elStatRail = document.getElementById('statRail');
        const elStatLoop = document.getElementById('statLoop');

        // Event Listener for Key Analysis
        elKeyInput.addEventListener('input', updateKeyAnalysis);

        function getCharValue(char) {
            if (!char) return 1;
            const upper = char.toUpperCase();
            if (upper >= 'A' && upper <= 'Z') {
                return upper.charCodeAt(0) - 64;
            }
            return 1;
        }

        function analyzeKey(key) {
            if (!key) {
                return { loop: 0, rail: 0, first: '-', last: '-', length: 0 };
            }
            const length = key.length;
            const loop = length;
            const first = key.charAt(0);
            const last = key.charAt(length - 1);
            
            const valFirst = getCharValue(first);
            const valLast = getCharValue(last);
            
            const rail = ((valFirst + valLast) % 4) + 2;
            
            return { loop, rail, first, last, length };
        }

        function updateKeyAnalysis() {
            const params = analyzeKey(elKeyInput.value);
            elStatLength.textContent = params.length;
            elStatFirst.textContent = params.first;
            elStatLast.textContent = params.last;
            elStatRail.textContent = params.rail;
            elStatLoop.textContent = params.loop;
        }

        function clearLog() {
            elLog.innerHTML = '';
        }

        function appendLog(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.textContent = message;
            elLog.appendChild(div);
            elLog.scrollTop = elLog.scrollHeight;
        }

        // --- Core Algorithms ---

        function xorCipher(text, key) {
            if (!key) return text;
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        function railFenceEncrypt(text, rails) {
            if (rails <= 1 || text.length <= rails) return text;
            let fence = Array.from({ length: rails }, () => []);
            let row = 0;
            let dir = 1;

            for (let i = 0; i < text.length; i++) {
                fence[row].push(text[i]);
                row += dir;
                if (row === 0 || row === rails - 1) {
                    dir *= -1;
                }
            }

            return fence.map(r => r.join('')).join('');
        }

        function railFenceDecrypt(text, rails) {
            if (rails <= 1 || text.length <= rails) return text;
            
            let lengths = Array(rails).fill(0);
            let row = 0;
            let dir = 1;
            
            for (let i = 0; i < text.length; i++) {
                lengths[row]++;
                row += dir;
                if (row === 0 || row === rails - 1) {
                    dir *= -1;
                }
            }

            let fence = [];
            let index = 0;
            for (let i = 0; i < rails; i++) {
                fence.push(text.substring(index, index + lengths[i]).split(''));
                index += lengths[i];
            }

            let result = '';
            row = 0;
            dir = 1;
            for (let i = 0; i < text.length; i++) {
                result += fence[row].shift();
                row += dir;
                if (row === 0 || row === rails - 1) {
                    dir *= -1;
                }
            }

            return result;
        }

        // Safe Base64 for 16-bit Javascript char codes (Unicode safe)
        function safeBase64Encode(str) {
            const bytes = new Uint8Array(str.length * 2);
            for (let i = 0; i < str.length; i++) {
                let code = str.charCodeAt(i);
                bytes[i * 2] = code & 0xff;
                bytes[i * 2 + 1] = code >> 8;
            }
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        function safeBase64Decode(b64) {
            let binary = atob(b64);
            let bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            let str = '';
            for (let i = 0; i < bytes.length; i += 2) {
                str += String.fromCharCode(bytes[i] | (bytes[i + 1] << 8));
            }
            return str;
        }

        // --- Process Flows ---

        function processCipher(mode) {
            const text = elInputText.value;
            const key = elKeyInput.value;

            if (!text || !key) {
                alert("Please provide both Input Text and Key.");
                return;
            }

            clearLog();
            const params = analyzeKey(key);
            
            if (mode === 'encrypt') {
                appendLog("Encrypt Started", "success");
                appendLog(`Loop Count: ${params.loop}`);
                appendLog(`Rail Count: ${params.rail}`);

                let current = text;
                for (let i = 1; i <= params.loop; i++) {
                    appendLog(`Round ${i}:`, "round");
                    
                    current = xorCipher(current, key);
                    appendLog("XOR Complete");
                    
                    current = railFenceEncrypt(current, params.rail);
                    appendLog("Rail Fence Complete");
                }

                try {
                    current = safeBase64Encode(current);
                    elOutputText.value = current;
                    appendLog("Base64 Encode Complete");
                    appendLog("Encryption Finished", "success");
                } catch (e) {
                    appendLog("Error in Base64 Encoding", "error");
                }

            } else if (mode === 'decrypt') {
                appendLog("Decrypt Started", "success");
                appendLog(`Loop Count: ${params.loop}`);
                appendLog(`Rail Count: ${params.rail}`);

                let current;
                try {
                    current = safeBase64Decode(text);
                    appendLog("Base64 Decode Complete");
                } catch (e) {
                    alert("Invalid Ciphertext format.");
                    appendLog("Base64 Decode Failed", "error");
                    return;
                }

                for (let i = 1; i <= params.loop; i++) {
                    appendLog(`Round ${i}:`, "round");
                    
                    current = railFenceDecrypt(current, params.rail);
                    appendLog("Rail Fence Complete");
                    
                    current = xorCipher(current, key);
                    appendLog("XOR Complete");
                }

                elOutputText.value = current;
                appendLog("Decryption Finished", "success");
            }
        }

        function copyOutput() {
            if (elOutputText.value) {
                navigator.clipboard.writeText(elOutputText.value)
                    .then(() => alert("Output copied to clipboard!"))
                    .catch(err => alert("Failed to copy text."));
            }
        }

        function clearAll() {
            elInputText.value = '';
            elKeyInput.value = '';
            elOutputText.value = '';
            clearLog();
            updateKeyAnalysis();
        }

        // Init
        updateKeyAnalysis();
    </script>
</body>
</html>
